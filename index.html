<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ali Wishlist</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#0b0b0f;
      color:white;
      min-height:100vh;
      padding:40px;
      background-image:
      radial-gradient(circle at top left,#6d28d922,transparent 25%),
      radial-gradient(circle at bottom right,#2563eb22,transparent 25%);
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
      font-weight:700;
      background:linear-gradient(90deg,#8b5cf6,#3b82f6);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .subtitle{
      color:#9ca3af;
      margin-bottom:35px;
    }

    .top-bar{
      display:flex;
      gap:15px;
      margin-bottom:35px;
      flex-wrap:wrap;
    }

    input, select{
      flex:1;
      min-width:220px;
      background:#111827;
      border:1px solid #1f2937;
      color:white;
      padding:16px;
      border-radius:16px;
      outline:none;
      font-size:15px;
      transition:.2s;
    }

    input:focus,
    select:focus{
      border-color:#8b5cf6;
      box-shadow:0 0 0 4px #8b5cf633;
    }

    button{
      border:none;
      background:linear-gradient(90deg,#8b5cf6,#3b82f6);
      color:white;
      padding:16px 22px;
      border-radius:16px;
      cursor:pointer;
      font-weight:600;
      font-size:15px;
      transition:.2s;
    }

    button:hover{
      transform:translateY(-2px);
      opacity:.95;
    }

    .categories{
      display:flex;
      gap:12px;
      margin-bottom:30px;
      flex-wrap:wrap;
    }

    .category{
      background:#111827;
      border:1px solid #1f2937;
      padding:10px 16px;
      border-radius:999px;
      cursor:pointer;
      transition:.2s;
      font-size:14px;
      color:#d1d5db;
    }

    .category.active{
      background:#8b5cf6;
      border-color:#8b5cf6;
      color:white;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(270px,1fr));
      gap:22px;
    }

    .card{
      background:#111827;
      border:1px solid #1f2937;
      border-radius:24px;
      overflow:hidden;
      transition:.25s;
      position:relative;
      cursor:grab;
    }

    .card:hover{
      transform:translateY(-5px);
      border-color:#374151;
    }

    .card img{
      width:100%;
      height:220px;
      object-fit:cover;
      background:#0f172a;
    }

    .content{
      padding:18px;
    }

    .title{
      font-size:15px;
      line-height:1.4;
      color:#f3f4f6;
      margin-bottom:14px;
      height:64px;
      overflow:hidden;
    }

    .bottom{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .tag{
      background:#1f2937;
      color:#9ca3af;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
    }

    .actions{
      display:flex;
      gap:10px;
      align-items:center;
    }

    .favorite,
    .edit,
    .delete{
      font-size:20px;
      cursor:pointer;
      user-select:none;
      transition:.2s;
    }

    .favorite:hover,
    .edit:hover,
    .delete:hover{
      transform:scale(1.15);
    }

    .empty{
      margin-top:60px;
      text-align:center;
      color:#6b7280;
    }

    a{
      text-decoration:none;
    }

    .modal{
      position:fixed;
      inset:0;
      background:#000000bb;
      display:none;
      justify-content:center;
      align-items:center;
      z-index:999;
      padding:20px;
    }

    .modal-box{
      width:100%;
      max-width:500px;
      background:#111827;
      border:1px solid #1f2937;
      border-radius:24px;
      padding:25px;
    }

    .modal-box h2{
      margin-bottom:20px;
    }

    .modal-box .inputs{
      display:flex;
      flex-direction:column;
      gap:15px;
    }

    .modal-actions{
      display:flex;
      gap:12px;
      margin-top:20px;
    }

    .secondary{
      background:#1f2937;
    }

    @media(max-width:700px){

      body{
        padding:20px;
      }

      h1{
        font-size:32px;
      }

      .top-bar{
        flex-direction:column;
      }

      input,
      select,
      button{
        width:100%;
      }

    }
  </style>
</head>
<body>

  <h1>Ali Wishlist</h1>

  <p class="subtitle">
    Organizando minha wishlist do AliExpress
  </p>

  <div class="top-bar">

    <input
      type="text"
      id="titleInput"
      placeholder="Título do produto"
    />

    <input
      type="text"
      id="imageInput"
      placeholder="URL da imagem"
    />

    <input
      type="text"
      id="urlInput"
      placeholder="Link do produto"
    />

    <button onclick="addProduct()">
      Adicionar
    </button>

  </div>

  <div class="categories" id="categories"></div>

  <div class="grid" id="grid"></div>

  <div class="empty" id="empty">
    Nenhum produto ainda.
  </div>

  <div class="modal" id="editModal">

    <div class="modal-box">

      <h2>Editar Produto</h2>

      <div class="inputs">

        <input type="text" id="editTitle" placeholder="Título">

        <input type="text" id="editImage" placeholder="Imagem">

        <input type="text" id="editUrl" placeholder="Link">

        <select id="editCategory">
          <option>Setup</option>
          <option>Roupas</option>
          <option>Anime</option>
          <option>Carro</option>
          <option>Outros</option>
        </select>

      </div>

      <div class="modal-actions">

        <button onclick="saveEdit()">
          Salvar
        </button>

        <button
          class="secondary"
          onclick="closeModal()"
        >
          Cancelar
        </button>

      </div>

    </div>

  </div>

  <script>

    const API_URL =
      "https://ali-backend-9ez3.onrender.com";

    const grid =
      document.getElementById("grid");

    const empty =
      document.getElementById("empty");

    const categoriesContainer =
      document.getElementById("categories");

    const editModal =
      document.getElementById("editModal");

    let products = [];
    let currentCategory = "Todos";
    let editingId = null;

    async function loadProducts() {

      const response =
        await fetch(`${API_URL}/products`);

      products = await response.json();

      renderCategories();
      renderProducts();

    }

    async function addProduct() {

      const title =
        document.getElementById("titleInput")
        .value
        .trim();

      const image =
        document.getElementById("imageInput")
        .value
        .trim();

      const url =
        document.getElementById("urlInput")
        .value
        .trim();

      if (!title || !url) {
        alert("Preencha título e link");
        return;
      }

      await fetch(`${API_URL}/add`, {
        method:"POST",
        headers:{
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          title,
          image,
          url
        })
      });

      document.getElementById("titleInput").value = "";
      document.getElementById("imageInput").value = "";
      document.getElementById("urlInput").value = "";

      loadProducts();

    }

    async function toggleFavorite(id) {

      await fetch(
        `${API_URL}/favorite/${id}`,
        {
          method:"PUT"
        }
      );

      loadProducts();

    }

    async function deleteProduct(id) {

      const confirmDelete =
        confirm("Deseja deletar este produto?");

      if (!confirmDelete) return;

      await fetch(
        `${API_URL}/delete/${id}`,
        {
          method:"DELETE"
        }
      );

      loadProducts();

    }

    function openEdit(product) {

      editingId = product.id;

      document.getElementById("editTitle").value =
        product.title;

      document.getElementById("editImage").value =
        product.image;

      document.getElementById("editUrl").value =
        product.url;

      document.getElementById("editCategory").value =
        product.category;

      editModal.style.display = "flex";

    }

    function closeModal() {

      editModal.style.display = "none";

    }

    async function saveEdit() {

      const title =
        document.getElementById("editTitle").value;

      const image =
        document.getElementById("editImage").value;

      const url =
        document.getElementById("editUrl").value;

      const category =
        document.getElementById("editCategory").value;

      await fetch(
        `${API_URL}/edit/${editingId}`,
        {
          method:"PUT",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            title,
            image,
            url,
            category
          })
        }
      );

      closeModal();

      loadProducts();

    }

    function renderCategories() {

      const categories =
        ["Todos", ...new Set(
          products.map(p => p.category)
        )];

      categoriesContainer.innerHTML = "";

      categories.forEach(cat => {

        const div =
          document.createElement("div");

        div.className =
          "category" +
          (currentCategory === cat
            ? " active"
            : "");

        div.innerText = cat;

        div.onclick = () => {

          currentCategory = cat;

          renderCategories();
          renderProducts();

        };

        categoriesContainer.appendChild(div);

      });

    }

    function renderProducts() {

      grid.innerHTML = "";

      let filtered = products;

      if (currentCategory !== "Todos") {

        filtered = products.filter(
          p => p.category === currentCategory
        );

      }

      filtered.sort((a,b) =>
        b.favorite - a.favorite
      );

      empty.style.display =
        filtered.length
          ? "none"
          : "block";

      filtered.forEach(product => {

        const card =
          document.createElement("div");

        card.className = "card";

        card.draggable = true;

        card.innerHTML = `

          <a href="${product.url}"
             target="_blank">

            <img
              src="${product.image || 'https://placehold.co/600x400/111827/ffffff?text=Sem+Imagem'}"
            />

            <div class="content">

              <div class="title">
                ${product.title}
              </div>

              <div class="bottom">

                <div class="tag">
                  ${product.category}
                </div>

                <div class="actions">

                  <div
                    class="favorite"
                    onclick="event.preventDefault(); toggleFavorite(${product.id})"
                  >
                    ${product.favorite ? "⭐" : "☆"}
                  </div>

                  <div
                    class="edit"
                    onclick='event.preventDefault(); openEdit(${JSON.stringify(product)})'
                  >
                    ✏️
                  </div>

                  <div
                    class="delete"
                    onclick="event.preventDefault(); deleteProduct(${product.id})"
                  >
                    🗑️
                  </div>

                </div>

              </div>

            </div>

          </a>

        `;

        grid.appendChild(card);

      });

    }

    loadProducts();

  </script>

</body>
</html>
